# ─── LOCAL DEVELOPMENT ────────────────────────────────────────────────────────
# Usage: docker compose up
# Requires server/.env at the project root (see server/.env.example).
# Hot-reload is enabled for the API (runserver).
# ─────────────────────────────────────────────────────────────────────────────

services:
    # ── Infrastructure ───────────────────────────────────────────────────────────
    db:
        image: pgvector/pgvector:pg16
        platform: linux/amd64
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
            APP_DB_USER: ${APP_DB_USER}
            APP_DB_PASSWORD: ${APP_DB_PASSWORD}
            PGBOUNCER_DB_USER: ${PGBOUNCER_DB_USER}
            PGBOUNCER_DB_PASSWORD: ${PGBOUNCER_DB_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./docker/postgres/init:/docker-entrypoint-initdb.d
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
                ]
            interval: 5s
            timeout: 5s
            retries: 10

    pgbouncer:
        image: public.ecr.aws/bitnami/pgbouncer:1.25.1-debian-12-r8
        platform: linux/amd64
        restart: unless-stopped
        environment:
            - PGBOUNCER_DATABASE=nishchinto
            - PGBOUNCER_PORT=5432
            - PGBOUNCER_AUTH_TYPE=md5
            - POSTGRESQL_HOST=db
            - POSTGRESQL_USER=${PGBOUNCER_DB_USER}
            - POSTGRESQL_PASSWORD=${PGBOUNCER_DB_PASSWORD}
            - PGBOUNCER_USERLIST="${PGBOUNCER_DB_USER}" "${PGBOUNCER_DB_PASSWORD}"
            - PGBOUNCER_MAX_CLIENT_CONN=500
            - PGBOUNCER_POOL_MODE=transaction
        depends_on:
            db:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "pgbouncer --version"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7
        platform: linux/amd64
        restart: unless-stopped
        volumes:
            - redis_data:/data
        command: ["redis-server", "--ignore-warnings", "ARM64-COW-BUG"]
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    rabbitmq:
        image: rabbitmq:3-management
        restart: unless-stopped
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        ports:
            - "15672:15672" # Management UI — http://localhost:15672
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    meilisearch:
        image: getmeili/meilisearch:latest
        restart: unless-stopped
        command:
            ["meilisearch", "--db-path", "/meili_data", "--env", "production"]
        environment:
            MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
        volumes:
            - meilisearch_data:/meili_data
        ports:
            - "7700:7700"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
            interval: 10s
            timeout: 5s
            retries: 5

    # ── Django API (hot-reload) ──────────────────────────────────────────────────
    api:
        build:
            context: .
            dockerfile: Dockerfile
        command: python manage.py runserver 0.0.0.0:8000
        restart: unless-stopped
        volumes:
            - .:/app # live-reload: code changes reflect instantly
        ports:
            - "8000:8000"
        environment:
            DEBUG: "True"
            SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-not-for-production}
            ALLOWED_HOSTS: "localhost,127.0.0.1,api"
            DATABASE_URL: ${DATABASE_URL}
            REDIS_URL: ${REDIS_URL}
            CELERY_BROKER_URL: ${CELERY_BROKER_URL}
            MEILISEARCH_HOST: ${MEILISEARCH_HOST}
            MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY}
            AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
            AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
            AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
            AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}
            CDN_BASE_URL: ${CDN_BASE_URL}
        depends_on:
            pgbouncer:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            meilisearch:
                condition: service_healthy

    # ── Celery Workers ───────────────────────────────────────────────────────────
    celery_worker_high:
        build:
            context: .
            dockerfile: Dockerfile
        command: celery -A nishchinto worker -l info -Q high_priority
        restart: unless-stopped
        volumes:
            - .:/app
        environment:
            DEBUG: "True"
            SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-not-for-production}
            DATABASE_URL: ${DATABASE_URL}
            CELERY_BROKER_URL: ${CELERY_BROKER_URL}
            REDIS_URL: ${REDIS_URL}
            MEILISEARCH_HOST: ${MEILISEARCH_HOST}
            MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY}
        depends_on:
            pgbouncer:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy

    celery_worker_default:
        build:
            context: .
            dockerfile: Dockerfile
        command: celery -A nishchinto worker -l info -Q default
        restart: unless-stopped
        volumes:
            - .:/app
        environment:
            DEBUG: "True"
            SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-not-for-production}
            DATABASE_URL: ${DATABASE_URL}
            CELERY_BROKER_URL: ${CELERY_BROKER_URL}
            REDIS_URL: ${REDIS_URL}
            MEILISEARCH_HOST: ${MEILISEARCH_HOST}
            MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY}
        depends_on:
            pgbouncer:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy

    celery_worker_media:
        build:
            context: .
            dockerfile: Dockerfile
        command: celery -A nishchinto worker -l info -Q media_processing
        restart: unless-stopped
        volumes:
            - .:/app
        environment:
            DEBUG: "True"
            SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-not-for-production}
            DATABASE_URL: ${DATABASE_URL}
            CELERY_BROKER_URL: ${CELERY_BROKER_URL}
            REDIS_URL: ${REDIS_URL}
            AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
            AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
            AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
            AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}
        depends_on:
            pgbouncer:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy

    celery_worker_ai_rag:
        build:
            context: .
            dockerfile: Dockerfile
        command: celery -A nishchinto worker -l info -Q ai_rag
        restart: unless-stopped
        volumes:
            - .:/app
        environment:
            DEBUG: "True"
            SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-not-for-production}
            DATABASE_URL: ${DATABASE_URL}
            CELERY_BROKER_URL: ${CELERY_BROKER_URL}
            REDIS_URL: ${REDIS_URL}
            OPENAI_API_KEY: ${OPENAI_API_KEY}
        depends_on:
            pgbouncer:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy

    celery_worker_ai_copy:
        build:
            context: .
            dockerfile: Dockerfile
        command: celery -A nishchinto worker -l info -Q ai_copy
        restart: unless-stopped
        volumes:
            - .:/app
        environment:
            DEBUG: "True"
            SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-not-for-production}
            DATABASE_URL: ${DATABASE_URL}
            CELERY_BROKER_URL: ${CELERY_BROKER_URL}
            REDIS_URL: ${REDIS_URL}
            OPENAI_API_KEY: ${OPENAI_API_KEY}
        depends_on:
            pgbouncer:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy

    celery_worker_ai_image:
        build:
            context: .
            dockerfile: Dockerfile
        command: celery -A nishchinto worker -l info -Q ai_image
        restart: unless-stopped
        volumes:
            - .:/app
        environment:
            DEBUG: "True"
            SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-not-for-production}
            DATABASE_URL: ${DATABASE_URL}
            CELERY_BROKER_URL: ${CELERY_BROKER_URL}
            REDIS_URL: ${REDIS_URL}
            OPENAI_API_KEY: ${OPENAI_API_KEY}
        depends_on:
            pgbouncer:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy

    celery_beat:
        build:
            context: .
            dockerfile: Dockerfile
        command: celery -A nishchinto beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
        restart: unless-stopped
        volumes:
            - .:/app
        environment:
            DEBUG: "True"
            SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-not-for-production}
            DATABASE_URL: ${DATABASE_URL}
            CELERY_BROKER_URL: ${CELERY_BROKER_URL}
            REDIS_URL: ${REDIS_URL}
        depends_on:
            pgbouncer:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy

volumes:
    postgres_data:
    redis_data:
    rabbitmq_data:
    meilisearch_data:
