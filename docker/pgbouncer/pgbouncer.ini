[databases]
nishchinto = host=db port=5432 dbname=nishchinto

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 500
default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 5
server_idle_timeout = 300
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
